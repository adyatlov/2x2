services:
  spacetimedb:
    image: clockworklabs/spacetime
    container_name: 2x2-spacetimedb
    command: start
    restart: unless-stopped
    volumes:
      - stdb-data:/stdb/data
    networks:
      - default
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/v1/ping"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  init:
    build:
      context: .
      target: publisher
    depends_on:
      spacetimedb:
        condition: service_healthy
    environment:
      SPACETIMEDB_SERVER: http://2x2-spacetimedb:3000
      SPACETIMEDB_DB_NAME: game
    networks:
      - default

  client:
    build:
      context: .
      target: client
    container_name: 2x2-client
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - default
      - proxy

volumes:
  stdb-data:

networks:
  proxy:
    external: true
