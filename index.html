<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2x2</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }
      #status {
        position: fixed;
        top: 12px;
        right: 16px;
        font-family: monospace;
        font-size: 14px;
        color: #666;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="status">connecting...</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
